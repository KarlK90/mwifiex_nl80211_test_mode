#
# UL-OFDMA: Standalone test
#
# Source: AN14114 "Testing standalone UL-OFDMA"
# Standalone UL-OFDMA test on the DUT (without golden unit):
# 5 GHz, 1x1 path A, 80 MHz bandwidth, Channel 36,
# 10 dBm target power, RU index 67, data rate MCS0.
#
# Note: This test setup is not typically used compared to the standard setup
# at the test lab. Consult with your test lab to determine if this test setup
# can be used for regulatory compliance testing.

steps:
  # 1. Enable RF test mode
  - rf_test_mode:
      enable: true

  # 2. Set the radio mode in 5 GHz (1x1 mode)
  - radio_mode:
      radio0: 3
      radio1: 0

  # 3. Set the band to 5 GHz
  - rf_band:
      band: ghz5

  # 4. Set the bandwidth to 80 MHz
  - channel_bandwidth:
      bandwidth: bw80

  # 5. Set TX power to 10 dBm, MCS modulation, path A
  - tx_power:
      power_dbm: 10
      modulation: mcs
      path: a

  # 6. Set the channel to 36
  - rf_channel:
      channel: 36

  # 7. Enable standalone trigger frame (RU index 67, data rate MCS0)
  - trigger_frame:
      enable: true
      standalone_hetb: standalone
      frame_ctrl_type: 1
      frame_ctrl_subtype: 2
      frame_duration: 5484
      ul_len: 1000
      ul_bw: bw80
      ltf_type: 1
      ldpc_ess: true
      pre_fec_pad_fct: 1
      spatial_reuse: 65535
      he_sig2: 511
      aid12: 5
      ru_alloc: 67
      ul_coding_type: true
      ul_target_rssi: 90

  # 8. Start TX_frame
  - tx_frame:
      enable: true
      tx_rate: 0x2100  # HE SS1 MCS0
      payload_pattern: 0xABABABAB
      payload_length: 0x256
      adjust_sifs_us: 20
      bssid: [0x05, 0x43, 0x3f, 0xc4, 0x51, 0x00]

  - wait_for_confirmation:
      message: "Standalone UL-OFDMA TX started. Press Enter to stop."

  - tx_frame:
      enable: false
